schema_version = 1
name = "minimal"
description = "Smallest public cross-language guardrails profile with local config, AGENTS, tracker, handoff, and optional CI wiring."
default_ci = "github"
root_markers = [".git"]
docs_enabled = true
required_docs = [
  "docs/project/implementation-tracker.md",
  "docs/project/handoff-template.md",
]
required_files = [
  "README.md",
  "AGENTS.md",
  ".guardrails/guardrails.toml",
  ".pre-commit-config.yaml",
]
forbidden_dirs = []
includes_handoff = true

[task_references]
required = true

[workflow_paths]
github = ".github/workflows/guardrails.yml"
gitlab = ".gitlab-ci.guardrails.yml"

[[starter_content]]
path = "AGENTS.md"
markers = [
  "Describe what this repository exists to do.",
  "state the approved implementation center",
  "state the main non-goals",
  "state what contributors should read before substantial work",
  "state what should never be widened casually",
]
threshold = 2

[[starter_content]]
path = "docs/project/implementation-tracker.md"
markers = [
  "define the current narrow slice of work",
  "replace this line with the next valid step",
  "replace this with explicit non-goals that prevent drift",
  "replace with assumptions validated by current work",
  "replace with unresolved decisions that could change scope",
]
threshold = 2

[[starter_content]]
path = "docs/project/handoff-template.md"
markers = [
  "what changed",
  "what was validated",
  "what remains intentionally unimplemented",
  "list the docs updated in the same change",
  "recommend the narrowest next step",
]
threshold = 2

[[managed_blocks]]
path = "AGENTS.md"
id = "repo-context"
generator = "repo_context_v1"
placement = "after_first_heading"

[[managed_blocks]]
path = "docs/project/implementation-tracker.md"
id = "task-sync"
generator = "tracker_sync_v1"
placement = "after_first_heading"

[semgrep]
enabled = false
binary = "semgrep"
config_paths = []
extra_args = []

[conftest]
enabled = false
binary = "conftest"
policy_paths = []
extra_args = []
