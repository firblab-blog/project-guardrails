version = 1
profile = "minimal"

[project]
name = "rust-repo"
root_markers = [".git"]

[docs]
enabled = true
required = [
    "docs/project/implementation-tracker.md",
    "docs/project/handoff-template.md",
]

[rules]
required_files = [
    "README.md",
    "AGENTS.md",
    ".guardrails/guardrails.toml",
]
forbidden_dirs = []

[ci]
provider = "github"
workflow_path = ".github/workflows/guardrails.yml"
