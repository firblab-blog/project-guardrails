schema_version = 1
name = "guardrails"
description = "Opt-in FirbLab-style doctrine profile with seeded AGENTS guidance, project docs, and curated best-practice references."
default_ci = "github"
root_markers = [".git"]
docs_enabled = true
required_docs = [
  "docs/project/implementation-tracker.md",
  "docs/project/handoff-template.md",
  "docs/project/decision-log.md",
  "docs/project/implementation-invariants.md",
  "docs/best-practices/change-safety.md",
  "docs/best-practices/ci-and-enforcement.md",
  "docs/best-practices/docs-and-handoffs.md",
  "docs/best-practices/repo-shaping.md",
]
required_files = [
  "README.md",
  "AGENTS.md",
  ".guardrails/guardrails.toml",
  ".pre-commit-config.yaml",
]
forbidden_dirs = []
includes_handoff = true

[task_references]
required = true

[workflow_paths]
github = ".github/workflows/guardrails.yml"
gitlab = ".gitlab-ci.guardrails.yml"

[[managed_blocks]]
path = "AGENTS.md"
id = "repo-context"
generator = "repo_context_v1"
placement = "after_first_heading"

[[managed_blocks]]
path = "docs/project/implementation-tracker.md"
id = "task-sync"
generator = "tracker_sync_v1"
placement = "after_first_heading"

[semgrep]
enabled = false
binary = "semgrep"
config_paths = []
extra_args = []

[conftest]
enabled = false
binary = "conftest"
policy_paths = []
extra_args = []
