schema_version = 1
name = "docs-driven"
description = "Cross-language profile for teams that want the minimal baseline plus a required decision log."
default_ci = "github"
root_markers = [".git"]
docs_enabled = true
required_docs = [
  "docs/project/implementation-tracker.md",
  "docs/project/handoff-template.md",
  "docs/project/decision-log.md",
]
required_files = [
  "README.md",
  "AGENTS.md",
  ".guardrails/guardrails.toml",
]
forbidden_dirs = []
includes_handoff = true

[workflow_paths]
github = ".github/workflows/guardrails.yml"
gitlab = ".gitlab-ci.guardrails.yml"

[semgrep]
enabled = false
binary = "semgrep"
config_paths = []
extra_args = []

[conftest]
enabled = false
binary = "conftest"
policy_paths = []
extra_args = []
